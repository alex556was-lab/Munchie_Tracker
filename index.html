<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Munchie Tracker — Staff</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --forest: #397b53;
      --forest-dark: #2d6343;
      --mint: #daeee4;
      --white: #ffffff;
      --text: #1a2e22;
      --muted: #6b8f78;
      --green: #27ae60;
      --red: #e74c3c;
      --radius: 18px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--mint); color: var(--text); min-height: 100vh; }

    /* HEADER */
    header {
      background: var(--forest);
      padding: 0 28px;
      display: flex; align-items: center; gap: 16px;
      height: 72px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 4px 20px rgba(57,123,83,0.3);
    }
    .logo-wrap { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-img { height: 52px; width: 52px; object-fit: contain; border-radius: 0; background: transparent; }
    .logo-text { font-family: 'Syne', sans-serif; font-size: 1.25rem; font-weight: 800; color: #fff; line-height: 1.1; }
    .logo-sub { font-size: 0.62rem; color: rgba(255,255,255,0.65); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; }
    .staff-badge {
      background: rgba(255,255,255,0.18); color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 5px 14px; border-radius: 20px;
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    }
    .student-link {
      margin-left: auto; padding: 8px 18px; border-radius: 30px;
      border: 2px solid rgba(255,255,255,0.35); color: rgba(255,255,255,0.85);
      text-decoration: none; font-size: 0.82rem; font-weight: 600; transition: all 0.2s;
    }
    .student-link:hover { border-color: #fff; color: #fff; background: rgba(255,255,255,0.1); }

    /* STATS */
    .stats-bar {
      display: flex; gap: 14px; padding: 16px 28px;
      background: rgba(57,123,83,0.06);
      border-bottom: 1px solid rgba(57,123,83,0.12);
      flex-wrap: wrap;
    }
    .stat { background: var(--white); border-radius: 12px; padding: 11px 20px; border: 1.5px solid rgba(57,123,83,0.1); }
    .stat-num { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--forest); }
    .stat-label { font-size: 0.74rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

    /* PRIMARY NAV */
    .cat-nav {
      display: flex; gap: 8px; padding: 14px 28px;
      overflow-x: auto; background: var(--white);
      border-bottom: 1px solid rgba(57,123,83,0.1);
    }
    .cat-nav::-webkit-scrollbar { display: none; }
    .cat-btn {
      padding: 7px 20px; border-radius: 30px; border: 2px solid #d0e8da;
      background: var(--white); cursor: pointer; font-family: 'DM Sans', sans-serif;
      font-weight: 600; font-size: 0.85rem; color: var(--muted); white-space: nowrap; transition: all 0.2s;
    }
    .cat-btn:hover { border-color: var(--forest); color: var(--forest); }
    .cat-btn.active { background: var(--forest); border-color: var(--forest); color: #fff; }

    /* SUBCATEGORY NAV */
    .sub-nav {
      display: none; gap: 7px; padding: 10px 28px;
      overflow-x: auto; background: #eef7f2;
      border-bottom: 1px solid rgba(57,123,83,0.1);
    }
    .sub-nav.visible { display: flex; }
    .sub-nav::-webkit-scrollbar { display: none; }
    .sub-btn {
      padding: 5px 16px; border-radius: 30px; border: 1.5px solid #c2dece;
      background: white; cursor: pointer; font-family: 'DM Sans', sans-serif;
      font-weight: 600; font-size: 0.8rem; color: var(--muted); white-space: nowrap; transition: all 0.2s;
    }
    .sub-btn:hover { border-color: var(--forest); color: var(--forest); }
    .sub-btn.active { background: var(--forest-dark); border-color: var(--forest-dark); color: #fff; }

    /* TOOLBAR */
    .toolbar { display: flex; align-items: center; gap: 14px; padding: 16px 28px 8px; }
    .search-wrap { position: relative; flex: 1; max-width: 340px; }
    .search-wrap input {
      width: 100%; padding: 10px 16px 10px 40px; border-radius: 30px;
      border: 1.5px solid rgba(57,123,83,0.15); background: var(--white);
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; outline: none; transition: border-color 0.2s;
    }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap input:focus { border-color: var(--forest); }
    .search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 0.85rem; }

    /* GRID */
    main { padding: 8px 28px 40px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 18px; }

    /* CARD */
    .card {
      background: var(--white); border-radius: var(--radius); overflow: hidden;
      border: 1.5px solid rgba(57,123,83,0.08);
      box-shadow: 0 2px 10px rgba(57,123,83,0.08);
      transition: transform 0.2s, border-color 0.2s;
      animation: fadeUp 0.35s both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    .card:hover { transform: translateY(-4px); border-color: rgba(57,123,83,0.25); box-shadow: 0 8px 24px rgba(57,123,83,0.14); }
    .card.out-card { border-color: rgba(231,76,60,0.3); }
    .card.low-card  { border-color: rgba(243,156,18,0.4); box-shadow: 0 0 0 2px #f0c04033; }
    .card img { width: 100%; height: 140px; object-fit: cover; display: block; }
    .card-body { padding: 14px; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .card-name { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; color: var(--text); }
    .card-meta { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 10px; }
    .qty-display { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; color: var(--forest); line-height: 1; }
    .qty-label { font-size: 0.68rem; color: var(--muted); }
    .status-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; margin-bottom: 12px;
    }
    .status-tag.ok  { background: #d4f7e0; color: #1a7a42; }
    .status-tag.low { background: #fff3cd; color: #856404; }
    .status-tag.out { background: #fde8e8; color: #842029; }
    .controls { display: flex; gap: 8px; }
    .btn {
      flex: 1; padding: 10px 6px; border: none; border-radius: 10px;
      cursor: pointer; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem;
      transition: all 0.18s; display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .btn-sold { background: rgba(231,76,60,0.1); color: #e74c3c; border: 1.5px solid rgba(231,76,60,0.25); }
    .btn-sold:hover:not(:disabled) { background: #e74c3c; color: white; transform: scale(1.03); }
    .btn-sold:disabled { opacity: 0.28; cursor: not-allowed; }
    .btn-restock { background: rgba(57,123,83,0.1); color: var(--forest); border: 1.5px solid rgba(57,123,83,0.2); }
    .btn-restock:hover { background: var(--forest); color: white; transform: scale(1.03); }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(57,123,83,0.5); }
      70%  { box-shadow: 0 0 0 10px rgba(57,123,83,0); }
      100% { box-shadow: 0 0 0 0 rgba(57,123,83,0); }
    }
    .card.updated { animation: pulse 0.6s ease-out; }

    #loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:55vh; gap:14px; color:var(--muted); }
    .spinner { width:38px; height:38px; border:4px solid #c8e6d4; border-top-color:var(--forest); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }

    #toast {
      position:fixed; bottom:28px; left:50%;
      transform:translateX(-50%) translateY(80px);
      background:var(--forest); color:white;
      padding:11px 26px; border-radius:30px; font-weight:700; font-size:0.88rem;
      z-index:999; transition:transform 0.3s; pointer-events:none;
      box-shadow:0 4px 16px rgba(57,123,83,0.35);
    }
    #toast.show { transform:translateX(-50%) translateY(0); }
  </style>
</head>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, doc, updateDoc, increment }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ✅ REPLACE THIS WITH YOUR FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "AIzaSyCEOR1MKzj3kHHaQL1LWpAC_qbph-Ktb2E",
    authDomain: "alexis-alvarez.firebaseapp.com",
    databaseURL: "https://alexis-alvarez-default-rtdb.firebaseio.com",
    projectId: "alexis-alvarez",
    storageBucket: "alexis-alvarez.firebasestorage.app",
    messagingSenderId: "1042648326183",
    appId: "1:1042648326183:web:fd3d105f8f0db640d26e02"

  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let allProducts = [];
  let activeCategory = "All";
  let activeSubcategory = "All";

  onSnapshot(collection(db, "products"), snap => {
    document.getElementById("loading").style.display = "none";
    allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateStats();
    buildNavs();
    render();
  });

  function updateStats() {
    document.getElementById("statTotal").textContent = allProducts.length;
    document.getElementById("statLow").textContent =
      allProducts.filter(p => p.quantity > 0 && p.quantity <= (p.lowStockThreshold || 3)).length;
    document.getElementById("statOut").textContent =
      allProducts.filter(p => p.quantity === 0).length;
  }

  function buildNavs() {
    const cats = ["All", "Meal Swipes", "Meal Money"];
    document.getElementById("catNav").innerHTML = cats.map(c => `
      <button class="cat-btn ${c === activeCategory ? 'active' : ''}"
              onclick="window._setCategory('${c}')">${c}</button>
    `).join("");

    const subNav = document.getElementById("subNav");
    if (activeCategory === "All") {
      subNav.classList.remove("visible");
      subNav.innerHTML = "";
    } else {
      const subs = ["All", ...new Set(
        allProducts.filter(p => p.category === activeCategory).map(p => p.subcategory).filter(Boolean)
      )];
      subNav.innerHTML = subs.map(s => `
        <button class="sub-btn ${s === activeSubcategory ? 'active' : ''}"
                onclick="window._setSubcategory('${s}')">${s}</button>
      `).join("");
      subNav.classList.add("visible");
    }
  }

  window._setCategory = function(cat) {
    activeCategory = cat;
    activeSubcategory = "All";
    buildNavs();
    render();
  };

  window._setSubcategory = function(sub) {
    activeSubcategory = sub;
    buildNavs();
    render();
  };

  window.render = function() {
    const q = document.getElementById("searchBar").value.toLowerCase();
    const filtered = allProducts.filter(p => {
      const matchCat = activeCategory === "All" || p.category === activeCategory;
      const matchSub = activeSubcategory === "All" || p.subcategory === activeSubcategory;
      return matchCat && matchSub && p.name.toLowerCase().includes(q);
    });
    const grid = document.getElementById("grid");

    grid.innerHTML = filtered.map((p, i) => {
      const isOut = p.quantity === 0;
      const isLow = !isOut && p.quantity <= (p.lowStockThreshold || 3);
      const statusClass = isOut ? "out" : isLow ? "low" : "ok";
      const statusText  = isOut ? "⚠ Out of Stock" : isLow ? `⚡ Low — ${p.quantity} left` : `✓ In Stock`;
      const cardExtra   = isOut ? "out-card" : isLow ? "low-card" : "";
      const metaLine    = p.subcategory ? `${p.subcategory}${p.mealType ? ' · ' + p.mealType : ''}` : p.category;
      const priceTag    = p.price ? ` · ${p.price}` : (p.category === "Meal Swipes" ? " · Meal Swipe" : "");

      return `
        <div class="card ${cardExtra}" style="animation-delay:${i*0.03}s" id="card-${p.id}">
          <img src="${p.imageUrl}" alt="${p.name}" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400&fit=crop'" />
          <div class="card-body">
            <div class="card-top">
              <div>
                <div class="card-name">${p.name}</div>
                <div class="card-meta">${metaLine}${priceTag}</div>
              </div>
              <div style="text-align:right">
                <div class="qty-display">${p.quantity}</div>
                <div class="qty-label">in stock</div>
              </div>
            </div>
            <span class="status-tag ${statusClass}">${statusText}</span>
            <div class="controls">
              <button class="btn btn-sold" onclick="window._soldOne('${p.id}','${p.name.replace(/'/g,"\\'")}',this)" ${isOut?'disabled':''}>− Sold 1</button>
              <button class="btn btn-restock" onclick="window._restock('${p.id}','${p.name.replace(/'/g,"\\'")}')">+ Add 10</button>
            </div>
          </div>
        </div>`;
    }).join("");
  };

  window._soldOne = async function(id, name, btn) {
    btn.disabled = true;
    await updateDoc(doc(db, "products", id), { quantity: increment(-1) });
    flashCard(id);
    showToast(`Sold 1 × ${name}`);
  };

  window._restock = async function(id, name) {
    await updateDoc(doc(db, "products", id), { quantity: increment(10) });
    flashCard(id);
    showToast(`Restocked ${name} +10`);
  };

  function flashCard(id) {
    const card = document.getElementById(`card-${id}`);
    if (card) { card.classList.remove("updated"); void card.offsetWidth; card.classList.add("updated"); }
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2200);
  }
</script>
</body>
</html>
